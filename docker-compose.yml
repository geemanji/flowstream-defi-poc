version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowstream
      POSTGRES_PASSWORD: flowstream
      POSTGRES_DB: flowstream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowstream"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://flowstream:flowstream@postgres:5432/flowstream?sslmode=disable"
      RPC_URL: "http://anvil:8545"
      CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000000"
    depends_on:
      postgres:
        condition: service_healthy

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"

volumes:
  pgdata:
